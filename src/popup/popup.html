<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptPing</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <img class="logo" src="../../assets/icon.svg" alt="" width="32" height="32" />
        <div class="header-text">
          <h1 class="brand">PromptPing</h1>
          <p class="eyebrow" id="eyebrow"></p>
        </div>
      </header>

      <section class="status-card" id="statusCard">
        <div class="status-icon" id="statusIcon">
          <svg class="icon-check" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="10" fill="currentColor" opacity="0.12"/>
            <path d="M6.5 10.5L9 13L13.5 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg class="icon-x" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="10" fill="currentColor" opacity="0.12"/>
            <path d="M7.5 7.5L12.5 12.5M12.5 7.5L7.5 12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg class="icon-spinner" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
            <path d="M10 2a8 8 0 0 1 8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="status-body">
          <h2 class="title" id="title"></h2>
          <p class="status" id="statusText"></p>
        </div>
      </section>

      <p class="site" id="siteText"></p>

      <button class="export-button" id="exportButton" type="button">
        <svg class="btn-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v8.5M4.5 7.5L8 11l3.5-3.5M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="btn-label" id="btnLabel"></span>
        <svg class="btn-spinner" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
          <path d="M8 2a6 6 0 0 1 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="toast" id="toast" role="alert" aria-live="polite"></div>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
